    needs to fetch some data, for the patient's name part
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>General Assessment Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>General Assessment Form</h2>
      <form action="http://localhost:3000/api/general_assessment" method="POST">

        <!-- Add this inside the form -->
<input type="hidden" name="patient_number" id="patient_number" />

        <div class="patient_name">
            <label for="patient_name">Patient's Name:</label>
            <input type="text" name="patient_name" id="patient_name" readonly />
        </div>

        <div class="visit_date">
          <label for="visit_date">Visit Date:</label> <br />
          <input type="date" name="visit_date" id="visit_date" required />
        </div>

        <div class="gen_health">
          <label for="gen_health">General Health:</label> <br />
          <input type="radio" name="gen_health" id="Good" value="Good" /> Good
          <input type="radio" name="gen_health" id="Poor" value="Poor" /> Poor
        </div>

        <div class="on_drugs">
          <label for="on_drugs">Are you currently using any drugs?</label>
          <br />
          <input type="radio" name="on_drugs" id="Yes" value="Yes" /> Yes
          <input type="radio" name="on_drugs" id="No" value="No" /> No
        </div>

        <div class="comments">
          <label for="comments">Comments:</label> <br />
          <textarea name="comments" id="comments" required></textarea>
        </div>
        <input type="hidden" name="form_type" value="general" />

        <input
          type="button"
          value="Cancel"
          id="cancel_button"
          onclick="clearForm()"
        />

        <input type="submit" value="Submit" id="submit_button" name="submit" />
      </form>
    </div>
    <script>
      
      // get values from session storage and assign the elements with them
      document.getElementById("patient_number").value = sessionStorage.getItem("patient_number")
      document.getElementById("patient_name").value = sessionStorage.getItem("patient_name")

      document.getElementById("patient_name").value =
        sessionStorage.getItem("patient_name");

      function clearForm() {
        document.querySelector("form").reset();
      }
    </script>
  </body>
</html>
